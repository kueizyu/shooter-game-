<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>對戰射擊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;}
#gw{width:100%;height:100%;display:flex;flex-direction:column;background:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#1a1a2e;border-bottom:0.5px solid rgba(255,255,255,0.08);flex-shrink:0;}
.hs{min-width:120px;}.hs.r{text-align:right;}
.pn{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:3px;}
.hb{width:120px;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;display:inline-block;}
.hf{height:100%;border-radius:3px;transition:width 0.1s;}
.kp{display:flex;gap:4px;margin-top:3px;}.kp.r{justify-content:flex-end;}
.pp{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);}
#sc{text-align:center;}
#sc .lbt{font-size:10px;color:rgba(255,255,255,0.4);}
#sc .sv{font-size:22px;font-weight:600;color:#fff;}
#ar{position:relative;flex:1;overflow:hidden;background:#0f0f23;}
.wall{position:absolute;border-radius:3px;z-index:2;}
.wall.solid{background:#2a2a4a;border:1px solid #3a3a6a;}
.wall.breakable{background:#3d2a0a;border:1.5px solid #854F0B;}
.wall-hp{position:absolute;bottom:0;left:0;height:3px;background:#E24B4A;border-radius:0 0 2px 2px;}
.bush{position:absolute;border-radius:50%;z-index:1;pointer-events:none;border:2px solid #1D9E75;background:rgba(93,202,165,0.2);}
.crate{position:absolute;width:26px;height:26px;border-radius:4px;z-index:3;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid #854F0B;background:#3d2a0a;color:#EF9F27;}
.pl{position:absolute;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;z-index:6;}
.bl{position:absolute;border-radius:50%;z-index:5;pointer-events:none;}
.pt{position:absolute;border-radius:50%;pointer-events:none;z-index:8;}
.rf{position:absolute;border-radius:50%;pointer-events:none;z-index:7;border:2px solid;}
.tr{position:absolute;border-radius:50%;pointer-events:none;z-index:2;}
.dt{position:absolute;font-size:12px;font-weight:600;pointer-events:none;z-index:10;animation:fu 0.8s forwards;}
@keyframes fu{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-32px);}}
.kb{position:absolute;left:50%;transform:translateX(-50%);top:20px;font-size:14px;font-weight:600;pointer-events:none;z-index:15;white-space:nowrap;color:#fff;animation:ba 1.4s forwards;}
@keyframes ba{0%{opacity:0;transform:translateX(-50%) scale(0.7);}15%{opacity:1;transform:translateX(-50%) scale(1.08);}80%{opacity:1;}100%{opacity:0;}}
.ibuf{position:absolute;font-size:11px;font-weight:600;pointer-events:none;z-index:11;white-space:nowrap;animation:fu 1s forwards;}
#roundbanner{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:25;pointer-events:none;background:rgba(0,0,0,0.6);}
#roundbanner .inner{font-size:20px;font-weight:600;color:#fff;background:#1a1a2e;border:0.5px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px 28px;text-align:center;}
#roundbanner .sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:5px;}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:30;background:#1a1a2e;padding:16px;}
#ov h2{font-size:20px;font-weight:600;color:#fff;}
.tip{font-size:11px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.8;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 16px;width:100%;}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;}
.cc{border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;background:rgba(255,255,255,0.04);}
.cc.sel{border:2px solid #378ADD;background:rgba(55,138,221,0.12);}
.ci{width:34px;height:34px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;}
.cn{font-size:11px;font-weight:600;color:#fff;margin-bottom:2px;}
.cd{font-size:9px;color:rgba(255,255,255,0.4);line-height:1.4;}
#sb{padding:12px 32px;font-size:14px;border:1px solid rgba(255,255,255,0.2);border-radius:25px;background:rgba(55,138,221,0.2);color:#fff;cursor:pointer;opacity:0.4;pointer-events:none;width:100%;}
#sb.ok{opacity:1;pointer-events:all;background:rgba(55,138,221,0.4);}
#wo{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:40;background:#1a1a2e;}
#wo h2{font-size:24px;font-weight:600;color:#fff;}
#wo p{font-size:14px;color:rgba(255,255,255,0.5);}
#wo button{padding:12px 32px;font-size:14px;border:1px solid rgba(255,255,255,0.2);border-radius:25px;background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;}
#ctrl{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#1a1a2e;border-top:0.5px solid rgba(255,255,255,0.08);height:120px;position:relative;flex-shrink:0;}
#joystick-zone{width:100px;height:100px;position:relative;display:flex;align-items:center;justify-content:center;}
#joystick-base{width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.15);}
#joystick-stick{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.4);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
#btn-zone{display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
#btn-fire{width:74px;height:74px;border-radius:50%;background:rgba(226,75,74,0.2);border:2.5px solid #E24B4A;color:#E24B4A;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}
#btn-fire.active{background:rgba(226,75,74,0.5);}
#btn-skill{width:52px;height:52px;border-radius:50%;background:rgba(55,138,221,0.2);border:2px solid #378ADD;color:#378ADD;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;position:absolute;right:84px;bottom:18px;user-select:none;}
#btn-skill.active{background:rgba(55,138,221,0.45);}
#btn-skill.cd{opacity:0.35;}
</style>
</head>
<body>
<div id="gw">
  <div id="hud">
    <div class="hs">
      <div class="pn" id="n1">玩家</div>
      <div class="hb"><div class="hf" id="h1" style="width:100%;background:#378ADD;"></div></div>
      <div class="kp" id="k1"></div>
    </div>
    <div id="sc"><div class="lbt">擊殺</div><div class="sv"><span id="v1">0</span>—<span id="v2">0</span></div></div>
    <div class="hs r">
      <div class="pn" id="n2">AI</div>
      <div class="hb" style="float:right"><div class="hf" id="h2" style="width:100%;background:#E24B4A;"></div></div>
      <div class="kp r" id="k2"></div>
    </div>
  </div>
  <div id="ar">
    <div id="roundbanner">
      <div class="inner"><div id="rb-title"></div><div class="sub" id="rb-sub"></div></div>
    </div>
    <div id="ov">
      <h2>對戰射擊</h2>
      <div class="tip">左搖桿移動 · 按住射擊自動連射 · 技能鍵發動特殊技能<br>草叢加速 · 踩箱得道具 · 橘牆可打破 · 三殺勝</div>
      <div class="cg" id="cg"></div>
      <button id="sb" onclick="startGame()">開始對戰</button>
    </div>
    <div id="wo"><h2 id="wt"></h2><p id="ws"></p><button onclick="resetGame()">再來一局</button></div>
  </div>
  <div id="ctrl">
    <div id="joystick-zone">
      <div id="joystick-base"></div>
      <div id="joystick-stick"></div>
    </div>
    <div id="btn-skill">技能</div>
    <div id="btn-zone">
      <div id="btn-fire">射擊</div>
    </div>
  </div>
</div>
<script>
var AC,p1,p2,bullets,walls,bushes,crates,raf,running,frozen;
var p1ft,p2ft,p1cd,p2cd,aiTimer,aiTX,aiTY,sel;
var WK=3,SCD=5000,WALL_HP=60,gameW,gameH;
var joyX=0,joyY=0,firing=false,joyTid=-1;

var CHARS=[
  {id:'ranger',name:'遊俠',desc:'G：朝移動方向衝刺',color:'#E6F1FB',border:'#378ADD',text:'#0C447C',icon:'R',spd:2.8,fr:140,dmg:12,hp:220,sn:'衝刺'},
  {id:'tank',name:'重甲',desc:'G：護盾2秒免疫傷害',color:'#EAF3DE',border:'#3B6D11',text:'#27500A',icon:'T',spd:1.8,fr:260,dmg:22,hp:340,sn:'護盾'},
  {id:'sniper',name:'狙擊手',desc:'G：連發三顆高傷子彈',color:'#FAEEDA',border:'#854F0B',text:'#633806',icon:'S',spd:3.2,fr:500,dmg:28,hp:180,sn:'三連狙'},
  {id:'ninja',name:'忍者',desc:'G：瞬移到對手反方向',color:'#EEEDFE',border:'#534AB7',text:'#3C3489',icon:'N',spd:3.8,fr:160,dmg:10,hp:190,sn:'瞬移'},
  {id:'bomber',name:'爆破手',desc:'G：腳下引爆範圍炸彈',color:'#FAECE7',border:'#993C1D',text:'#712B13',icon:'B',spd:2.4,fr:220,dmg:15,hp:240,sn:'大爆炸'},
  {id:'medic',name:'醫護',desc:'G：立即回復30%血量',color:'#FBEAF0',border:'#993556',text:'#72243E',icon:'M',spd:3.0,fr:170,dmg:11,hp:260,sn:'治療'},
];
var ITEMS=[
  {id:'atk',icon:'⚔',label:'攻擊+50%',color:'#EF9F27',dur:7000},
  {id:'heal',icon:'❤',label:'回血30%',color:'#5DCAA5',dur:0},
  {id:'speed',icon:'⚡',label:'加速40%',color:'#85B7EB',dur:6000},
  {id:'ivn',icon:'🛡',label:'無敵2秒',color:'#85B7EB',dur:2000},
];

function gac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function snd(f,tp,dur,vol){try{var ac=gac(),o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime;o.connect(g);g.connect(ac.destination);o.type=tp;o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*0.3,t+dur);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.05);}catch(e){}}
function pshoot(id){if(id==='sniper')snd(900,'sawtooth',0.12,0.12);else if(id==='tank')snd(180,'square',0.2,0.15);else snd(600,'square',0.08,0.08);}
function pwallbreak(){snd(200,'sawtooth',0.18,0.18);}
function pkill(){try{var ac=gac(),t=ac.currentTime;[523,659,784,1047].forEach(function(f,i){var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.setValueAtTime(f,t+i*0.08);g.gain.setValueAtTime(0.14,t+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.18);o.start(t+i*0.08);o.stop(t+i*0.08+0.2);});}catch(e){}}
function pwin(){try{var ac=gac(),t=ac.currentTime;[523,659,784,659,784,1047].forEach(function(f,i){var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.setValueAtTime(f,t+i*0.12);g.gain.setValueAtTime(0.14,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.2);o.start(t+i*0.12);o.stop(t+i*0.12+0.22);});}catch(e){}}
function plose(){try{var ac=gac(),t=ac.currentTime;[392,349,330,262].forEach(function(f,i){var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.setValueAtTime(f,t+i*0.15);g.gain.setValueAtTime(0.12,t+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.22);o.start(t+i*0.15);o.stop(t+i*0.15+0.25);});}catch(e){}}
function pskill(id){if(id==='ninja'||id==='ranger')snd(300,'sine',0.18,0.16);else if(id==='tank')snd(120,'square',0.4,0.18);else if(id==='medic'){try{var ac=gac(),t=ac.currentTime;[400,550,700].forEach(function(f,i){var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.setValueAtTime(f,t+i*0.1);g.gain.setValueAtTime(0.11,t+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.18);o.start(t+i*0.1);o.stop(t+i*0.1+0.2);});}catch(e){}}else snd(800,'sawtooth',0.1,0.12);}
function pitem(){snd(800,'sine',0.18,0.14);}

function buildGrid(){
  var g=document.getElementById('cg');g.innerHTML='';
  CHARS.forEach(function(c){
    var d=document.createElement('div');d.className='cc';
    d.innerHTML='<div class="ci" style="background:'+c.color+';color:'+c.text+';">'+c.icon+'</div><div class="cn">'+c.name+'</div><div class="cd">'+c.desc+'</div>';
    d.onclick=function(){document.querySelectorAll('.cc').forEach(function(x){x.classList.remove('sel');});d.classList.add('sel');sel=c;document.getElementById('sb').classList.add('ok');};
    g.appendChild(d);
  });
}
buildGrid();

function bpips(id,color){var el=document.getElementById(id);el.innerHTML='';for(var i=0;i<WK;i++){var p=document.createElement('div');p.className='pp';p.style.borderColor=color;el.appendChild(p);}}
function upips(){
  if(!p1||!p2)return;
  document.querySelectorAll('#k1 .pp').forEach(function(p,i){p.style.background=i<p1.score?p1.c.border:'transparent';p.style.borderColor=p1.c.border;});
  document.querySelectorAll('#k2 .pp').forEach(function(p,i){p.style.background=i<p2.score?p2.c.border:'transparent';p.style.borderColor=p2.c.border;});
}

function bwalls(W,H){
  walls=[];
  document.getElementById('ar').querySelectorAll('.wall').forEach(function(e){e.remove();});
  var defs=[
    {x:W*0.17,y:H*0.07,w:60,h:11,t:'s'},{x:W*0.52,y:H*0.05,w:50,h:11,t:'s'},{x:W*0.74,y:H*0.07,w:60,h:11,t:'s'},
    {x:W*0.05,y:H*0.28,w:11,h:70,t:'s'},{x:W*0.88,y:H*0.28,w:11,h:70,t:'s'},
    {x:W*0.05,y:H*0.62,w:11,h:60,t:'s'},{x:W*0.88,y:H*0.62,w:11,h:60,t:'s'},
    {x:W*0.17,y:H*0.85,w:60,h:11,t:'s'},{x:W*0.52,y:H*0.87,w:50,h:11,t:'s'},{x:W*0.74,y:H*0.85,w:60,h:11,t:'s'},
    {x:W*0.46,y:H*0.3,w:11,h:50,t:'s'},{x:W*0.46,y:H*0.6,w:11,h:40,t:'s'},
  ];
  var bPool=[[W*0.27,H*0.2],[W*0.55,H*0.2],[W*0.17,H*0.4],[W*0.64,H*0.4],[W*0.27,H*0.6],[W*0.55,H*0.6],[W*0.21,H*0.52],[W*0.73,H*0.52],[W*0.32,H*0.75],[W*0.56,H*0.75]];
  bPool.sort(function(){return Math.random()-0.5;}).slice(0,7).forEach(function(s){
    var h=Math.random()>0.5;defs.push({x:s[0],y:s[1],w:h?65:11,h:h?11:50,t:'b'});
  });
  defs.forEach(function(w){
    var el=document.createElement('div');el.className='wall '+(w.t==='b'?'breakable':'solid');
    var wx=Math.round(w.x),wy=Math.round(w.y);
    el.style.cssText='left:'+wx+'px;top:'+wy+'px;width:'+w.w+'px;height:'+w.h+'px;';
    var obj={x:wx,y:wy,w:w.w,h:w.h,breakable:w.t==='b',hp:WALL_HP,maxHp:WALL_HP,el:el,alive:true};
    if(w.t==='b'){var hb=document.createElement('div');hb.className='wall-hp';hb.style.width='100%';el.appendChild(hb);obj.hpBar=hb;}
    document.getElementById('ar').appendChild(el);walls.push(obj);
  });
}
function bbushes(W,H){
  bushes=[];
  document.getElementById('ar').querySelectorAll('.bush').forEach(function(e){e.remove();});
  var pool=[[W*0.13,H*0.52],[W*0.79,H*0.48],[W*0.46,H*0.14],[W*0.25,H*0.78],[W*0.69,H*0.78],[W*0.3,H*0.35],[W*0.65,H*0.35]];
  pool.sort(function(){return Math.random()-0.5;}).slice(0,4).forEach(function(s){
    var r=20+Math.random()*8;
    var el=document.createElement('div');el.className='bush';
    el.style.cssText='left:'+(s[0]-r)+'px;top:'+(s[1]-r)+'px;width:'+(r*2)+'px;height:'+(r*2)+'px;';
    document.getElementById('ar').appendChild(el);bushes.push({x:s[0],y:s[1],r:r});
  });
}
function bcrates(W,H){
  crates=[];
  document.getElementById('ar').querySelectorAll('.crate').forEach(function(e){e.remove();});
  var pool=[[W*0.46,H*0.46],[W*0.2,H*0.33],[W*0.76,H*0.33],[W*0.14,H*0.1],[W*0.82,H*0.1],[W*0.14,H*0.84],[W*0.82,H*0.84],[W*0.35,H*0.5],[W*0.62,H*0.5]];
  pool.sort(function(){return Math.random()-0.5;}).slice(0,5).forEach(function(s){
    var item=ITEMS[Math.floor(Math.random()*ITEMS.length)];
    var el=document.createElement('div');el.className='crate';
    el.style.left=(Math.round(s[0])-13)+'px';el.style.top=(Math.round(s[1])-13)+'px';
    el.textContent='?';document.getElementById('ar').appendChild(el);
    crates.push({x:Math.round(s[0]),y:Math.round(s[1]),el:el,alive:true,item:item});
  });
}
function mkp(c,x,y){
  var ar=document.getElementById('ar');
  var el=document.createElement('div');el.className='pl';
  el.style.cssText='left:'+x+'px;top:'+y+'px;background:'+c.color+';border:2px solid '+c.border+';color:'+c.text+';';
  el.textContent=c.icon;ar.appendChild(el);
  return{el:el,x:x,y:y,c:c,hp:c.hp,mhp:c.hp,score:0,dead:false,
    shield:false,atkBoost:false,atkTimer:0,speedBoost:false,speedTimer:0,ivn:false,ivnTimer:0};
}
function achar(){var o=CHARS.filter(function(c){return c.id!==sel.id;});return o[Math.floor(Math.random()*o.length)];}

function initControls(){
  var joyBase=document.getElementById('joystick-base');
  var joyStick=document.getElementById('joystick-stick');
  var joyZone=document.getElementById('joystick-zone');
  function updateJoy(cx,cy){
    var rect=joyBase.getBoundingClientRect();
    var ox=cx-(rect.left+rect.width/2),oy=cy-(rect.top+rect.height/2);
    var maxR=rect.width/2-6,dist=Math.sqrt(ox*ox+oy*oy);
    if(dist>maxR){ox=ox/dist*maxR;oy=oy/dist*maxR;}
    joyX=ox/maxR;joyY=oy/maxR;
    joyStick.style.transform='translate(calc(-50% + '+Math.round(ox)+'px), calc(-50% + '+Math.round(oy)+'px))';
  }
  function resetJoy(){joyX=0;joyY=0;joyStick.style.transform='translate(-50%,-50%)';}
  joyZone.addEventListener('touchstart',function(e){e.preventDefault();joyTid=e.changedTouches[0].identifier;updateJoy(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  document.addEventListener('touchmove',function(e){for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===joyTid){e.preventDefault();updateJoy(e.changedTouches[i].clientX,e.changedTouches[i].clientY);}}},{passive:false});
  document.addEventListener('touchend',function(e){for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===joyTid){joyTid=-1;resetJoy();}}});
  var fb=document.getElementById('btn-fire');
  fb.addEventListener('touchstart',function(e){e.preventDefault();gac();firing=true;fb.classList.add('active');},{passive:false});
  fb.addEventListener('touchend',function(e){e.preventDefault();firing=false;fb.classList.remove('active');},{passive:false});
  fb.addEventListener('mousedown',function(){gac();firing=true;fb.classList.add('active');});
  document.addEventListener('mouseup',function(){firing=false;document.getElementById('btn-fire').classList.remove('active');});
  var sk=document.getElementById('btn-skill');
  sk.addEventListener('touchstart',function(e){e.preventDefault();gac();if(p1&&p1cd<=0){doSkill(p1,p2,gameW,gameH);p1cd=SCD;}},{passive:false});
  sk.addEventListener('mousedown',function(){if(p1&&p1cd<=0){doSkill(p1,p2,gameW,gameH);p1cd=SCD;}});
}
initControls();

function startGame(){
  gac();
  document.getElementById('ov').style.display='none';
  document.getElementById('wo').style.display='none';
  document.getElementById('ar').querySelectorAll('.pl,.bl,.pt,.dt,.kb,.rf,.tr').forEach(function(e){e.remove();});
  bullets=[];p1ft=0;p2ft=0;p1cd=0;p2cd=0;aiTimer=0;running=false;frozen=false;
  if(raf)cancelAnimationFrame(raf);
  var ar=document.getElementById('ar');
  gameW=ar.clientWidth;gameH=ar.clientHeight;
  bwalls(gameW,gameH);bbushes(gameW,gameH);bcrates(gameW,gameH);
  var ac=achar();
  p1=mkp(sel,Math.round(gameW*0.08),Math.round(gameH/2-15));
  p2=mkp(ac,Math.round(gameW*0.88),Math.round(gameH/2-15));
  aiTX=p1.x;aiTY=p1.y;
  document.getElementById('n1').textContent='玩家·'+sel.name;
  document.getElementById('n2').textContent='AI·'+ac.name;
  bpips('k1',sel.border);bpips('k2',ac.border);
  uhud();upips();running=true;
  var last=performance.now();
  function tick(now){if(!running)return;update(Math.min(now-last,50),gameW,gameH);last=now;raf=requestAnimationFrame(tick);}
  raf=requestAnimationFrame(tick);
}
function resetGame(){
  running=false;frozen=false;if(raf)cancelAnimationFrame(raf);
  document.getElementById('wo').style.display='none';
  document.getElementById('roundbanner').style.display='none';
  document.getElementById('ov').style.display='flex';
  document.getElementById('ar').querySelectorAll('.pl,.bl,.pt,.dt,.kb,.rf,.tr,.wall,.bush,.crate').forEach(function(e){e.remove();});
  sel=null;document.getElementById('sb').classList.remove('ok');buildGrid();
}
function showRoundBanner(title,sub,cb){
  frozen=true;bullets=[];
  document.getElementById('ar').querySelectorAll('.bl').forEach(function(e){e.remove();});
  document.getElementById('rb-title').textContent=title;
  document.getElementById('rb-sub').textContent=sub;
  document.getElementById('roundbanner').style.display='flex';
  setTimeout(function(){document.getElementById('roundbanner').style.display='none';frozen=false;if(cb)cb();},2000);
}
function resetPositions(){
  p1.x=Math.round(gameW*0.08);p1.y=Math.round(gameH/2-15);
  p1.el.style.left=p1.x+'px';p1.el.style.top=p1.y+'px';
  p2.x=Math.round(gameW*0.88);p2.y=Math.round(gameH/2-15);
  p2.el.style.left=p2.x+'px';p2.el.style.top=p2.y+'px';
  p1.shield=false;p1.el.style.outline='none';p2.shield=false;p2.el.style.outline='none';
  p1.atkBoost=false;p1.speedBoost=false;p1.ivn=false;
  p2.atkBoost=false;p2.speedBoost=false;p2.ivn=false;
  p1ft=0;p2ft=0;p1cd=0;p2cd=0;aiTimer=0;
}
function dst(ax,ay,bx,by){return Math.sqrt((bx-ax)*(bx-ax)+(by-ay)*(by-ay));}
function aliveWalls(){return walls.filter(function(w){return w.alive;});}
function whit(x,y,r){var aw=aliveWalls();for(var i=0;i<aw.length;i++){var w=aw[i];if(x+r>w.x&&x-r<w.x+w.w&&y+r>w.y&&y-r<w.y+w.h)return w;}return null;}
function rov(x,y,s,w){return x+s>w.x&&x<w.x+w.w&&y+s>w.y&&y<w.y+w.h;}
function tmv(p,vx,vy,W,H){
  var s=30,nx=Math.max(0,Math.min(W-s,p.x+vx)),ny=Math.max(0,Math.min(H-s,p.y+vy));
  var aw=aliveWalls(),hx=false,hy=false;
  for(var i=0;i<aw.length;i++){if(rov(nx,p.y,s,aw[i]))hx=true;if(rov(p.x,ny,s,aw[i]))hy=true;}
  if(!hx)p.x=nx;if(!hy)p.y=ny;
  p.el.style.left=p.x+'px';p.el.style.top=p.y+'px';
}
function inBush(p){var cx=p.x+15,cy=p.y+15;for(var i=0;i<bushes.length;i++){if(dst(cx,cy,bushes[i].x,bushes[i].y)<bushes[i].r+5)return true;}return false;}
function checkCrates(p){var cx=p.x+15,cy=p.y+15;for(var i=0;i<crates.length;i++){var cr=crates[i];if(cr.alive&&dst(cx,cy,cr.x,cr.y)<22)pickItem(p,cr);}}
function pickItem(p,cr){
  cr.alive=false;cr.el.remove();pitem();
  var item=cr.item;
  if(item.id==='atk'){p.atkBoost=true;p.atkTimer=item.dur;}
  else if(item.id==='heal'){p.hp=Math.min(p.mhp,p.hp+Math.round(p.mhp*0.3));uhud();}
  else if(item.id==='speed'){p.speedBoost=true;p.speedTimer=item.dur;}
  else if(item.id==='ivn'){p.ivn=true;p.ivnTimer=item.dur;p.el.style.outline='3px solid #EF9F27';}
  var pop=document.createElement('div');pop.className='ibuf';
  pop.style.cssText='left:'+(p.x+2)+'px;top:'+(p.y-10)+'px;color:'+item.color+';';
  pop.textContent=item.icon+' '+item.label;
  document.getElementById('ar').appendChild(pop);
  setTimeout(function(){if(pop.parentNode)pop.remove();},900);
}
function pushApart(W,H){
  var cx1=p1.x+15,cy1=p1.y+15,cx2=p2.x+15,cy2=p2.y+15,d=dst(cx1,cy1,cx2,cy2);
  if(d<30&&d>0.5){var nx=(cx1-cx2)/d,ny=(cy1-cy2)/d;tmv(p1,nx*3,ny*3,W,H);tmv(p2,-nx*3,-ny*3,W,H);}
}
function update(dt,W,H){
  if(frozen)return;
  p1ft=Math.max(0,p1ft-dt);p2ft=Math.max(0,p2ft-dt);
  p1cd=Math.max(0,p1cd-dt);p2cd=Math.max(0,p2cd-dt);
  if(p1.atkBoost){p1.atkTimer-=dt;if(p1.atkTimer<=0)p1.atkBoost=false;}
  if(p1.speedBoost){p1.speedTimer-=dt;if(p1.speedTimer<=0)p1.speedBoost=false;}
  if(p1.ivn){p1.ivnTimer-=dt;if(p1.ivnTimer<=0){p1.ivn=false;p1.el.style.outline='none';}}
  if(p2.atkBoost){p2.atkTimer-=dt;if(p2.atkTimer<=0)p2.atkBoost=false;}
  if(p2.speedBoost){p2.speedTimer-=dt;if(p2.speedTimer<=0)p2.speedBoost=false;}
  if(p2.ivn){p2.ivnTimer-=dt;if(p2.ivnTimer<=0){p2.ivn=false;p2.el.style.outline='none';}}
  var p1Bush=inBush(p1),p2Bush=inBush(p2);
  var sp=p1.c.spd*(p1.speedBoost?1.4:1)*(p1Bush?1.6:1)*(p1.shield?0.4:1);
  tmv(p1,joyX*sp,joyY*sp,W,H);
  if(firing&&p1ft<=0){fire(p1,p2);p1ft=p1.c.fr;}
  checkCrates(p1);
  var sk=document.getElementById('btn-skill');
  if(p1cd>0){sk.classList.add('cd');sk.textContent=Math.ceil(p1cd/1000)+'s';}
  else{sk.classList.remove('cd');sk.textContent='技能';}
  aiTimer-=dt;
  if(aiTimer<=0){
    aiTimer=220+Math.random()*180;
    var d=dst(p2.x,p2.y,p1.x,p1.y);
    var bestCrate=null,bestDist=200;
    for(var ci=0;ci<crates.length;ci++){if(crates[ci].alive){var cd2=dst(p2.x+15,p2.y+15,crates[ci].x,crates[ci].y);if(cd2<bestDist){bestDist=cd2;bestCrate=crates[ci];}}}
    if(bestCrate&&bestDist<160&&Math.random()<0.5){aiTX=bestCrate.x-15;aiTY=bestCrate.y-15;}
    else if(d>140){aiTX=p1.x+(Math.random()-0.5)*50;aiTY=p1.y+(Math.random()-0.5)*50;}
    else{var a=Math.atan2(p2.y-p1.y,p2.x-p1.x)+(Math.random()-0.5)*1.0;aiTX=p2.x+Math.cos(a)*100;aiTY=p2.y+Math.sin(a)*100;}
    aiTX=Math.max(20,Math.min(W-50,aiTX));aiTY=Math.max(20,Math.min(H-50,aiTY));
    if(p2cd<=0&&Math.random()<0.4){doSkill(p2,p1,W,H);p2cd=SCD;}
  }
  var dx=aiTX-p2.x,dy=aiTY-p2.y,len=Math.sqrt(dx*dx+dy*dy);
  if(len>2){var sp2=p2.c.spd*(p2.speedBoost?1.4:1)*(p2Bush?1.6:1)*0.92;tmv(p2,dx/len*sp2,dy/len*sp2,W,H);}
  if(p2ft<=0&&dst(p2.x,p2.y,p1.x,p1.y)<340){fire(p2,p1);p2ft=p2.c.fr;}
  checkCrates(p2);
  pushApart(W,H);
  p1.el.style.opacity=p1Bush?'0.3':'1';
  p2.el.style.opacity='1';
  bullets=bullets.filter(function(b){
    b.x+=b.vx*(dt/16);b.y+=b.vy*(dt/16);
    b.el.style.left=b.x+'px';b.el.style.top=b.y+'px';
    if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+10){b.el.remove();return false;}
    var hw=whit(b.x,b.y,5);
    if(hw){
      parts(b.x,b.y,b.ow.c.border,4);
      if(hw.breakable){hw.hp-=b.dm;if(hw.hp<=0){hw.alive=false;hw.el.remove();pwallbreak();parts(hw.x+hw.w/2,hw.y+hw.h/2,'#EF9F27',8);}else hw.hpBar.style.width=(hw.hp/hw.maxHp*100)+'%';}
      b.el.remove();return false;
    }
    var tg=b.ow===p1?p2:p1;
    if(!tg.ivn&&dst(b.x,b.y,tg.x+15,tg.y+15)<20){
      applyDmg(tg,b.dm,b.x,b.y,b.ow);
      if(b.ow.c.id==='bomber')exfx(b.x,b.y,b.ow);
      b.el.remove();return false;
    }
    return true;
  });
}
function fire(sh,tg){
  pshoot(sh.c.id);
  var sx=sh.x+15,sy=sh.y+15,tx=tg.x+15,ty=tg.y+15;
  var angle=Math.atan2(ty-sy,tx-sx)+(Math.random()-0.5)*(sh.c.id==='bomber'?0.22:sh.c.id==='sniper'?0.03:0.12);
  var sz=sh.c.id==='tank'?12:sh.c.id==='sniper'?5:7;
  var bsp=sh.c.id==='sniper'?11:sh.c.id==='tank'?4.5:6;
  var el=document.createElement('div');el.className='bl';
  el.style.cssText='left:'+(sx-sz/2)+'px;top:'+(sy-sz/2)+'px;width:'+sz+'px;height:'+sz+'px;background:'+sh.c.border+';';
  document.getElementById('ar').appendChild(el);
  bullets.push({el:el,x:sx-sz/2,y:sy-sz/2,vx:Math.cos(angle)*bsp,vy:Math.sin(angle)*bsp,ow:sh,dm:sh.c.dmg*(sh.atkBoost?1.5:1)});
}
function doSkill(p,o,W,H){
  pskill(p.c.id);
  var ar=document.getElementById('ar'),id=p.c.id;
  if(id==='ranger'){trl(p,ar);tmv(p,p.c.spd*20,0,W,H);ring(p.x+15,p.y+15,p.c.border,40,ar);}
  else if(id==='ninja'){trl(p,ar);var dx=o.x-p.x,dy=o.y-p.y,l=Math.sqrt(dx*dx+dy*dy)||1;tmv(p,-dx/l*90,-dy/l*90,W,H);for(var i=0;i<3;i++)(function(ii){setTimeout(function(){ring(p.x+15,p.y+15,p.c.border,28+ii*14,ar);},ii*70);})(i);}
  else if(id==='tank'){p.shield=true;p.el.style.outline='4px solid '+p.c.border;ring(p.x+15,p.y+15,p.c.border,50,ar);setTimeout(function(){if(!p.ivn){p.shield=false;p.el.style.outline='none';}},2200);}
  else if(id==='bomber'){exfx(p.x+15,p.y+15,p);(function(px,py){setTimeout(function(){if(!o.ivn&&dst(px,py,o.x+15,o.y+15)<85)applyDmg(o,p.c.dmg*(p.atkBoost?1.5:1)*2.5,px,py,p);},100);})(p.x+15,p.y+15);}
  else if(id==='sniper'){for(var i=0;i<3;i++)(function(ii){setTimeout(function(){if(!frozen)fire(p,o);},ii*80);})(i);ring(p.x+15,p.y+15,p.c.border,35,ar);}
  else if(id==='medic'){var h=Math.round(p.mhp*0.3);p.hp=Math.min(p.mhp,p.hp+h);uhud();parts(p.x+15,p.y+15,'#5DCAA5',12);for(var i=0;i<3;i++)(function(ii){setTimeout(function(){ring(p.x+15,p.y+15,'#5DCAA5',24+ii*12,ar);},ii*90);})(i);dtxt(p.x+15,p.y+6,'+'+h,'#5DCAA5');}
}
function applyDmg(p,d,bx,by,killer){
  if(frozen)return;
  p.hp=Math.max(0,p.hp-d);uhud();
  dtxt(bx,by,'-'+Math.round(d),killer.c.border);
  if(p.hp<=0)killP(p,killer);
}
function killP(p,killer){
  if(frozen)return;
  pkill();killer.score++;upips();
  document.getElementById(killer===p1?'v1':'v2').textContent=killer.score;
  parts(p.x+15,p.y+15,p.c.border,20);
  var sub='玩家 '+p1.hp+'/'+p1.mhp+'  AI '+p2.hp+'/'+p2.mhp;
  if(killer.score>=WK){frozen=true;setTimeout(function(){endG(killer);},600);return;}
  showRoundBanner((killer===p1?'玩家':'AI')+' 擊殺！',sub,function(){
    bwalls(gameW,gameH);bbushes(gameW,gameH);bcrates(gameW,gameH);resetPositions();
  });
}
function endG(winner){
  running=false;frozen=false;if(raf)cancelAnimationFrame(raf);
  if(winner===p1)pwin();else plose();
  document.getElementById('wt').textContent=winner===p1?'玩家勝利！':'AI 勝利！';
  document.getElementById('ws').textContent=winner.c.name+' 以 '+winner.score+' 殺獲勝';
  document.getElementById('wo').style.display='flex';
}
function exfx(cx,cy,ow){parts(cx,cy,ow.c.border,16);var ar=document.getElementById('ar');for(var i=0;i<3;i++)(function(ii){setTimeout(function(){ring(cx,cy,ow.c.border,28+ii*20,ar);},ii*55);})(i);}
function parts(cx,cy,color,count){
  var ar=document.getElementById('ar');
  for(var i=0;i<count;i++){
    var el=document.createElement('div');el.className='pt';var sz=Math.random()*4+2;
    el.style.cssText='left:'+cx+'px;top:'+cy+'px;width:'+sz+'px;height:'+sz+'px;background:'+color+';';
    ar.appendChild(el);var vx=(Math.random()-0.5)*7,vy=(Math.random()-0.5)*7;
    (function(e2,vx2,vy2){var t=0;var iv=setInterval(function(){t+=16;e2.style.left=(cx+vx2*t/16)+'px';e2.style.top=(cy+vy2*t/16)+'px';e2.style.opacity=Math.max(0,1-t/280);if(t>280){clearInterval(iv);e2.remove();}},16);})(el,vx,vy);
  }
}
function ring(cx,cy,color,size,ar){
  var el=document.createElement('div');el.className='rf';
  el.style.cssText='left:'+(cx-size/2)+'px;top:'+(cy-size/2)+'px;width:'+size+'px;height:'+size+'px;border-color:'+color+';opacity:0.8;';
  ar.appendChild(el);var t=0;
  var iv=setInterval(function(){t+=16;var s=size+t*0.13;el.style.width=s+'px';el.style.height=s+'px';el.style.left=(cx-s/2)+'px';el.style.top=(cy-s/2)+'px';el.style.opacity=Math.max(0,0.8-t/280);if(t>280){clearInterval(iv);el.remove();}},16);
}
function trl(p,ar){
  for(var i=0;i<6;i++)(function(ii){setTimeout(function(){
    var el=document.createElement('div');el.className='tr';
    el.style.cssText='left:'+p.x+'px;top:'+p.y+'px;width:28px;height:28px;background:'+p.c.border+';opacity:0.3;';
    ar.appendChild(el);var op=0.3;
    var iv=setInterval(function(){op-=0.05;el.style.opacity=Math.max(0,op);if(op<=0){clearInterval(iv);el.remove();}},28);
  },ii*26);})(i);
}
function dtxt(x,y,txt,color){
  var el=document.createElement('div');el.className='dt';
  el.style.cssText='left:'+(x-10)+'px;top:'+y+'px;color:'+color+';';el.textContent=txt;
  document.getElementById('ar').appendChild(el);setTimeout(function(){if(el.parentNode)el.remove();},800);
}
function uhud(){
  if(!p1||!p2)return;
  document.getElementById('h1').style.width=(p1.hp/p1.mhp*100)+'%';
  document.getElementById('h2').style.width=(p2.hp/p2.mhp*100)+'%';
}
</script>
